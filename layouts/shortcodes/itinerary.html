<div class="itinerary">
  {{ range $.Site.Data.itinerary.days }}
    <div class="day-section mb-10">
      <h3 class="text-xl font-bold border-b-2 pb-2">{{ .date }} - {{ .title }}</h3>
      <ul class="mt-4 space-y-4">
        {{ range .spots }}
          <li class="flex flex-col">
            <span class="font-semibold text-primary-600">{{ .time }} | {{ .name }}</span>
            <p class="text-sm text-gray-600 mt-1">{{ .note }}</p>
          </li>
        {{ end }}
      </ul>
    </div>
  {{ end }}
</div>
