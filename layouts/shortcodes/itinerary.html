<div class="itinerary-table">
  {{ range .Site.Data.itinerary.itinerary }}
  <div class="day-block" style="border-bottom: 1px solid #eee; padding: 15px 0;">
    <h4>{{ .day }} - {{ .area }}</h4>
    
    <div class="activity">
      <strong>上午：</strong> {{ .morning }}
      {{ if .morning_map }}
        <a href="{{ .morning_map }}" target="_blank" title="導航">📍</a>
      {{ end }}
    </div>
    
    <div class="activity">
      <strong>下午：</strong> {{ .afternoon }}
      {{ if .afternoon_map }}
        <a href="{{ .afternoon_map }}" target="_blank" title="導航">📍</a>
      {{ end }}
    </div>
    
    <div class="note" style="font-size: 0.9em; color: #666; margin-top: 5px;">
      <span class="tag" style="background: #f0f0f0; padding: 2px 6px;">{{ .transport }}</span> 
      {{ .note }}
    </div>
  </div>
  {{ end }}
</div>
