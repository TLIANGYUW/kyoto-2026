name: Deploy Hugo site to Pages
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0 # 確保抓取完整歷史（對於主題模組很重要）

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          # 升級至 v0.145.0 以支援 "try" 函數與 Blowfish 最新邏輯
          hugo-version: '0.145.0' 
          extended: true

      - name: Build
        # 執行編譯，--gc 用於清理暫存，--minify 進行壓縮
        run: hugo --minify --gc

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public