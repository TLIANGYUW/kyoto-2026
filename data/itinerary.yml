trip_name: "2026 京都新綠"
flight_info:
  outbound: "CI156 (TPE 08:20 - KIX 12:00)"
  inbound: "CI153 (KIX 14:30 - TPE 16:25)"
stay_info:
  - period: "Day 1 - Day 6 (二選一)"
    hotel: "Dormy Inn PREMIUM 京都站前"
    features: "天然溫泉、消除疲勞首選"
    hotel_url: "https://dormy-hotels.com/dormyinn/hotels/kyoto/"
    map_url: "https://www.google.com/maps/search/?api=1&query=Dormy+Inn+PREMIUM+Kyoto+Ekimae&query_place_id=ChIJVSsR2bEIAWARZsSeuqhAc4E"
  - period: "Day 1 - Day 6 (二選一)"
    hotel: "Hotel Keihan Kyoto Grande"
    features: "車站直連、物流接駁首選"
    hotel_url: "https://www.hotelkeihan.co.jp/kyoto/"
    map_url: "https://www.google.com/maps/search/?api=1&query=Hotel+Keihan+Kyoto+Grande&query_place_id=ChIJdQ1BzrUJAWARpGRRDp3u_RI"
  - period: "Day 6 - Day 7"
    hotel: "OMO 關西機場 by 星野集團"
    features: "機場接駁、大浴場設施"
    hotel_url: "https://hoshinoresorts.com/ja/hotels/omokansaiairport/"
    map_url: "https://www.google.com/maps/search/?api=1&query=OMO+Kansai+Airport&query_place_id=ChIJpyZX-s3JAGARiEnLf3rAoEA"

itinerary:
  - day: "Day 1"
    area: "京都車站 / 錦市場 / 鴨川"
    morning: "CI156 抵達與 Haruka 接駁"
    m_map: "https://www.google.com/maps/search/?api=1&query=Kyoto+Station&query_place_id=ChIJ7wKLka4IAWARCByidG5EGrY"
    afternoon: "錦市場散策 & 鴨川河畔休憩"
    a_map: "https://www.google.com/maps/search/?api=1&query=Nishiki+Market&query_place_id=ChIJF7FjtZsIAWAR28TtXaaV868"
    transport: "Haruka + 地鐵烏丸線"
    note: "首日護膝：錦市場路面平坦，傍晚在鴨川久坐看景，減輕長途飛行壓力。"

  - day: "Day 2"
    area: "嵐山 / 金閣寺"
    morning: "09:02 嵯峨野小火車"
    m_map: "https://www.google.com/maps/search/?api=1&query=Saga-Arashiyama+Station&query_place_id=ChIJeVL-m_6pAWAR2fDtIzRBWRI"
    afternoon: "金閣寺 (計程車接駁)"
    a_map: "https://www.google.com/maps/search/?api=1&query=Kinkakuji&query_place_id=ChIJvUbrwCCoAWARX2QiHCsn5A4"
    transport: "遊船 + 計程車"
    note: "利用計程車避開坡道步行。"

  - day: "Day 3"
    area: "天橋立 / 伊根 / 美山"
    morning: "天橋立 (飛龍觀單軌)"
    m_map: "https://www.google.com/maps/search/?api=1&query=Amanohashidate+View+Land&query_place_id=ChIJ6_0U0DmR_18RavYyKt5Ycog"
    afternoon: "伊根舟屋 / 美山合掌村"
    a_map: "https://www.google.com/maps/search/?api=1&query=Miyama+Kayabuki+no+Sato&query_place_id=ChIJj6DuIB_LAWARQYPR92HLa-Q"
    transport: "Alphard 私人包車"
    note: "10小時包車，行李全日隨車最輕鬆。"

  - day: "Day 4"
    area: "修學院 / 下鴨神社"
    morning: "修學院離宮 (預約制攝影)"
    m_map: "https://www.google.com/maps/search/?api=1&query=Shugakuin+Imperial+Villa&query_place_id=ChIJTQ1m18cJAWAR4qoAaylinnI"
    afternoon: "下鴨神社 (糺之森)"
    a_map: "https://www.google.com/maps/search/?api=1&query=Shimogamo+Shrine&query_place_id=ChIJf438RkAIAWARzM3lfzI7uAM"
    transport: "地鐵 + 叡山電車"
    note: "離宮有緩坡，建議穿著足弓支撐鞋；下午林道平坦。"

  - day: "Day 5"
    area: "葵祭 / 宇治"
    morning: "葵祭 (御苑付費席)"
    m_map: "https://www.google.com/maps/search/?api=1&query=Kyoto+Gyoen&query_place_id=ChIJ608z_6sJAWARi9I57i2dG78"
    afternoon: "宇治 (平等院)"
    a_map: "https://www.google.com/maps/search/?api=1&query=Byodoin&query_place_id=ChIJnzi-N_8IAWARmBf2I4oIUn0"
    transport: "JR 快速"
    note: "祭典坐著觀看節省體力，下午宇治步道極為平整。"

  - day: "Day 6"
    area: "奈良 / OMO 關西機場"
    morning: "東大寺看鹿 / 奈良公園"
    m_map: "https://www.google.com/maps/search/?api=1&query=Todai-ji&query_place_id=ChIJ3XYIepA5AWARjzzVnT-skPg"
    afternoon: "移動至 OMO 飯店"
    a_map: "https://www.google.com/maps/search/?api=1&query=OMO+Kansai+Airport&query_place_id=ChIJpyZX-s3JAGARiEnLf3rAoEA"
    transport: "Haruka 特急"
    note: "利用 Airporter 寄送行李，空手遊奈良，晚間入住 OMO 溫泉恢復。"

  - day: "Day 7"
    area: "臨空城 / 返程"
    morning: "臨空城 Outlet (9:30 開門)"
    m_map: "https://www.google.com/maps/search/?api=1&query=Rinku+Premium+Outlets&query_place_id=ChIJyUp2VsvJAGARcQG88oH7vN0"
    afternoon: "CI153 返程 (14:30 起飛)"
    a_map: "https://www.google.com/maps/search/?api=1&query=Kansai+International+Airport&query_place_id=ChIJId97f0_HAGAR1WIsXQ-OQoA"
    transport: "接駁電車 (1 站)"
    note: "中午 12 點前抵達機場。"